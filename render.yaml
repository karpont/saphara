services:
  - type: web
    name: saphara-api
    runtime: node
    plan: free
    buildCommand: npm install -g pnpm@9 && pnpm install && pnpm --filter @saphara/api... build && pnpm --filter @saphara/api exec prisma generate
    startCommand: cd apps/api && node dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        value: https://saphara.io,https://www.saphara.io
      - key: NEXT_PUBLIC_PART_TOKEN_ADDRESS
        value: 0xD95aC89029451c57Adf172192176d7264d49305a
      - key: TREASURY_ADDRESS
        value: 0x55B26f8CD67632d7AF9a888c645054Ca76E53455
      - key: NEXT_PUBLIC_TREASURY_ADDRESS
        value: 0x55B26f8CD67632d7AF9a888c645054Ca76E53455
      - key: NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID
        value: fbbb3188505f9fc9d192fced8c2a313d
      - key: BSC_RPC_URL
        value: https://bsc-dataseed1.binance.org
      - key: BOT_SCAN_INTERVAL_MS
        value: 900000
      - key: PNPM_HOME
        value: /opt/render/project/.pnpm
