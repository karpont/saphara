<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" fill="none">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0B429"/>
      <stop offset="100%" stop-color="#D4920A"/>
    </linearGradient>
  </defs>

  <!-- S hexagon icon -->
  <polygon points="28,8 44,8 52,22 44,36 28,36 20,22"
    fill="url(#logoGrad)" opacity="0.95"/>
  <text x="36" y="28"
    font-family="'Arial Black', sans-serif"
    font-size="18" font-weight="900"
    fill="#1a1300" text-anchor="middle">S</text>

  <!-- SAPHARA wordmark -->
  <text x="60" y="32"
    font-family="'Arial Black', 'Helvetica Neue', sans-serif"
    font-size="26" font-weight="900"
    fill="#F0B429"
    letter-spacing="1">SAPHARA</text>

  <!-- Tagline -->
  <text x="62" y="46"
    font-family="'Arial', sans-serif"
    font-size="8" font-weight="400"
    fill="#8b90a0"
    letter-spacing="2">CRYPTO SOCIAL NETWORK</text>
</svg>
